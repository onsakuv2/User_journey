<!DOCTYPE html>
<html>
<head>
    <title>{% if task %}Edit Task{% else %}Add Task{% endif %}</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="date"], textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        .btn { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; width: 100%; margin-top: 10px;}
        .back-link { display: block; margin-top: 15px; text-align: center; text-decoration: none; color: #007BFF; }
    </style>
</head>
<body>

    <h2>{% if task %}Edit Task{% else %}Add New Task{% endif %}</h2>

    <form action="/task" method="post">
        <input type="hidden" name="task_id" value="{{ task.id if task else '' }}">

        <div class="form-group">
            <label>Task Name</label>
            <input type="text" name="name" required value="{{ task.name if task else '' }}">
        </div>

        <div class="form-group">
            <label>Task Description</label>
            <textarea name="description" required>{{ task.description if task else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Task Category</label>
            <select name="category">
                <option value="general" {% if task and task.category == 'general' %}selected{% endif %}>General</option>
                <option value="advanced" {% if task and task.category == 'advanced' %}selected{% endif %}>Advanced</option>
            </select>
        </div>

        <div class="form-group">
            <label>Task Start Date</label>
            <input type="date" name="start_date" required value="{{ task.start_date if task else '' }}">
        </div>

        <div class="form-group">
            <label>Task End Date</label>
            <input type="date" name="end_date" required value="{{ task.end_date if task else '' }}">
        </div>

        <button type="submit" class="btn">Submit Task</button>
    </form>

    <a href="/home" class="back-link">← Back to Home</a>

</body>
</html>
